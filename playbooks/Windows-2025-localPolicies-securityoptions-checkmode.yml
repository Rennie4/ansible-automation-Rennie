---
- name: Windows Server 2025 – Security Audit & S3 Report
  hosts: all
  gather_facts: yes
  vars:
    s3_bucket_name: "oml-s3-automation-sandbox"
    s3_region: "eu-west-1"
    # Unified paths for the AAP Execution Environment
    temp_template: "/tmp/security_report.j2"
    local_html_report: "/tmp/Security_Audit_{{ inventory_hostname }}.html"

  tasks:
    - name: Create Audit Template on Controller
      delegate_to: localhost
      ansible.builtin.copy:
        dest: "{{ temp_template }}"
        content: |
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <style>
                  body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f9; padding: 40px; }
                  .card { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
                  h1 { color: #1e3a8a; border-bottom: 3px solid #3b82f6; padding-bottom: 10px; }
                  table { width: 100%; border-collapse: collapse; margin-top: 20px; }
                  th { background: #1e3a8a; color: white; text-align: left; padding: 12px; }
                  td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
                  .Enabled { color: #16a34a; font-weight: bold; background: #f0fdf4; padding: 4px 8px; border-radius: 4px; }
                  .Disabled { color: #dc2626; font-weight: bold; background: #fef2f2; padding: 4px 8px; border-radius: 4px; }
                  .Not-Defined { color: #94a3b8; font-style: italic; }
              </style>
          </head>
          <body>
              <div class="card">
                  <h1>CIS 2025 Security Audit: {{ inventory_hostname }}</h1>
                  <table>
                      <thead><tr><th>Policy Item</th><th>Status</th></tr></thead>
                      <tbody>
                          {% for line in scan_lines %}
                          {% set parts = line.split('|') %}
                          {% set status_val = parts[1].strip() %}
                          <tr>
                              <td>{{ parts[0].strip() }}</td>
                              <td><span class="{{ status_val.replace(' ', '-') }}">{{ status_val }}</span></td>
                          </tr>
                          {% endfor %}
                      </tbody>
                  </table>
              </div>
          </body>
          </html>

    - name: Audit CIS Item 2.52 (Interactive Logon)
      ansible.windows.win_powershell:
        script: |
          $path = "HKLM:\Software\Microsoft\Windows\CurrentVersion\Policies\System"
          $name = "DontDisplayLastUserName"
          $val = (Get-ItemProperty -Path $path -Name $name -ErrorAction SilentlyContinue).$name
          $status = if ($null -eq $val) { "Not Defined" } elseif ($val -eq 1) { "Enabled" } else { "Disabled" }
          return @{ scan_results = @("Interactive logon: Do not display last user name | $status") }
      register: audit_results

    - name: Generate Local HTML
      delegate_to: localhost
      ansible.builtin.template:
        src: "{{ temp_template }}"
        dest: "{{ local_html_report }}"
      vars:
        scan_lines: "{{ audit_results.output[0].scan_results }}"

    - name: Upload Report to S3
      delegate_to: localhost
      amazon.aws.s3_object:
        bucket: "{{ s3_bucket_name }}"
        object: "audits/{{ local_html_report | basename }}"
        src: "{{ local_html_report }}"
        mode: put
        region: "{{ s3_region }}"
