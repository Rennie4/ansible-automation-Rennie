---
- name: Full Audit of Windows Server 2025 Security Options
  hosts: all
  gather_facts: yes
  vars:
    s3_bucket_name: "oml-s3-automation-sandbox"
    s3_region: "eu-west-1"
    report_filename: "Full_Security_Options_Audit_{{ inventory_hostname_short }}_{{ ansible_date_time.iso8601_basic_short }}.html"

  tasks:
    - name: Export and Parse All Security Options
      ansible.windows.win_powershell:
        script: |
          # Export local security policy to a temp file
          $tempFile = Join-Path $env:TEMP "secedit_export.inf"
          secedit /export /cfg $tempFile /areas SECURITYPOLICY | Out-Null
          
          # Read the [Registry Values] section which contains "Security Options"
          $content = Get-Content $tempFile
          $isRegistrySection = $false
          $results = @()

          foreach ($line in $content) {
              if ($line -match "\[Registry Values\]") { $isRegistrySection = $true; continue }
              if ($line -match "\[") { $isRegistrySection = $false }
              
              if ($isRegistrySection -and $line -match "=") {
                  $parts = $line.Split("=", 2)
                  $regPath = $parts[0].Trim()
                  $valData = $parts[1].Trim().Split(",")
                  
                  # Extract just the friendly-ish name and the value
                  $results += @{
                      Key = $regPath
                      Value = if ($valData.Count -gt 2) { $valData[2] } else { $valData[1] }
                  }
              }
          }
          return @{ audit_data = $results }
      register: full_audit

    - name: Render Full Security Report
      delegate_to: localhost
      ansible.builtin.template:
        src: "../templates/Windows-2025-SecurityOptions-FullAudit.j2"
        dest: "/tmp/{{ report_filename }}"
      vars:
        # Pass the full list of objects to the template
        all_options: "{{ full_audit.output[0].audit_data }}"
      check_mode: no

    - name: Upload Full Report to S3
      delegate_to: localhost
      amazon.aws.s3_object:
        bucket: "{{ s3_bucket_name }}"
        object: "security-options-audits/{{ report_filename }}"
        src: "/tmp/{{ report_filename }}"
        mode: put
        region: "{{ s3_region }}"
      check_mode: no
