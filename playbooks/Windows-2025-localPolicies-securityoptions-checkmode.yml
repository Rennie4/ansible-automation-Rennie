---
- name: "CIS Security Options - Windows Server 2025 (Check Mode)"
  hosts: windows_hosts
  gather_facts: no

  vars:
    script_path: "C:\\Temp\\Export-CIS-SecurityOptions-2.38-2.101.ps1"
    script_url: "https://raw.githubusercontent.com/Rennie4/ansible-automation-Rennie/main/playbooks/Export-CIS-SecurityOptions-2.38-2.101.ps1"
    s3_bucket_uri: "s3://oml-s3-automation-sandbox/security-options-reports/"
    aws_exe_path: "C:\\Program Files\\Amazon\\AWSCLIV2\\aws.exe"
    region: "eu-west-1"

  tasks:

    - name: "Ensure C:\\Temp exists"
      ansible.windows.win_file:
        path: C:\Temp
        state: directory
      check_mode: yes

    - name: "Write embedded PowerShell script to Windows host"
      ansible.windows.win_copy:
        dest: "{{ script_path }}"
        content: |
          # PASTE YOUR FULL POWERSHELL SCRIPT HERE
          Write-Host "CIS Script Executed"
      check_mode: yes

    - name: "Execute CIS Security Options Script (Check Mode)"
      ansible.windows.win_shell: >
        PowerShell.exe -ExecutionPolicy Bypass
        -File "{{ script_path }}"
        -S3Uri "{{ s3_bucket_uri }}"
        -AwsExe "{{ aws_exe_path }}"
        -Region "{{ region }}"
      args:
        executable: powershell.exe
      register: script_output
      check_mode: yes

    - name: "Show Script Output"
      debug:
        msg: "{{ script_output.stdout_lines | default('Script did not run (skipped due to check mode).') }}"
