---
- name: "CIS Security Options - Windows Server 2025 (Run/Check-safe)"
  hosts: windows_hosts
  gather_facts: no

  vars:
    # Local paths on Windows target
    script_path: "C:\\Temp\\Export-CIS-SecurityOptions-2.38-2.101.ps1"
    html_glob:   "C:\\Temp\\CIS_SecurityOptions_2.38-2.101_*.html"

    # Script parameters
    s3_bucket_uri: "s3://oml-s3-automation-sandbox/security-options-reports/"
    aws_exe_path:  "C:\\Program Files\\Amazon\\AWSCLIV2\\aws.exe"
    region:        "eu-west-1"

  tasks:
    - name: "Ensure C:\\Temp exists"
      ansible.windows.win_file:
        path: C:\Temp
        state: directory

    - name: "Write embedded PowerShell script to Windows host"
      ansible.windows.win_copy:
        dest: "{{ script_path }}"
        # 🔽 Paste the complete PS1 body below
        content: |
          # ==============================================================
          # Export-CIS-SecurityOptions-2.38-2.101.ps1 (embedded by Ansible)
          # ==============================================================

          param(
            [string]$S3Uri   = "s3://oml-s3-automation-sandbox/security-options-reports/",
            [string]$AwsExe  = "C:\Program Files\Amazon\AWSCLIV2\aws.exe",
            [string]$Region  = "eu-west-1"
          )

          $ErrorActionPreference = 'Stop'

          $TempDir  = "C:\Temp"
          $InfPath  = Join-Path $TempDir "SecExport.inf"
          $Timestamp = Get-Date -Format 'yyyyMMdd_HHmm'
          $HtmlPath = Join-Path $TempDir ("CIS_SecurityOptions_2.38-2.101_{0}_{1}.html" -f $env:COMPUTERNAME,$Timestamp)
          $LogPath  = Join-Path $TempDir ("CIS_SecurityOptions_Run_{0}.log" -f (Get-Date -Format 'yyyyMMdd_HHmmss'))

          New-Item -ItemType Directory -Path $TempDir -ErrorAction SilentlyContinue | Out-Null
          Start-Transcript -Path $LogPath -Append | Out-Null

          try {
            if (-not (Test-Path $AwsExe)) { throw "AWS CLI not found at $AwsExe" }

            # --- secedit export + parse (Registry Values + built-in name queries) ---
            secedit /export /cfg $InfPath | Out-Null
            if (-not (Test-Path $InfPath)) { throw "secedit did not create $InfPath" }

            function Get-InfSection {
              param([string]$Path,[string]$HeaderRegex)
              $raw   = Get-Content $Path -Raw
              $lines = $raw -split "`r?`n"
              $start = ($lines | Select-String $HeaderRegex).LineNumber
              if (-not $start) { return @() }
              $nextHeader = $lines | Select-String '^\[.*\]' | Where-Object { $_.LineNumber -gt $start } | Select-Object -First 1
              $endLine = if ($nextHeader) { $nextHeader.LineNumber - 1 } else { $lines.Count }
              return $lines[($start+1)..$endLine]
            }

            function Decode-InfValue {
              param([string]$Raw)
              if ($Raw -match '^(\d+)\s*,\s*(.*)$') {
                $typeCode = [int]$matches[1]; $dataPart = $matches[2]
                switch ($typeCode) {
                  4 { $d=$dataPart.Trim(); if($d -match '^0x[0-9a-fA-F]+$'){[int]$d} elseif($d -match '^\d+$'){[int]$d}else{$d} }
                  1 { $dataPart.Trim('"') }
                  7 { $d=($dataPart -replace '\\0\\0$','' -replace '\\0$',''); (($d -split '\\0') | % { $_.Trim('"') } | ? { $_ }) -join '; ' }
                  default { $dataPart }
                }
              } else { $Raw }
            }

            $regMap = @{}
            (Get-InfSection -Path $InfPath -HeaderRegex '^\[Registry Values\]$' | ? { $_ -and $_ -notmatch '^\s*;' }) | % {
              if ($_ -match '=') { $parts = $_ -split '=',2; $regMap[$parts[0].Trim()] = $parts[1].Trim() }
            }

            function Get-FromRegMap([hashtable]$m,[string]$k){ if ($m.ContainsKey($k)) { Decode-InfValue $m[$k] } else { $null } }

            function R-Map([object]$v,[hashtable]$map){ $s="$v"; if($map.ContainsKey($s)){$map[$s]}else{$s} }
            $R_OnOff   = { param($v) if ($v -eq 1) {'Enabled'} elseif ($v -eq 0) {'Disabled'} else { "$v" } }
            $R_Text    = { param($v) "$v" }

            # Built-in accounts
