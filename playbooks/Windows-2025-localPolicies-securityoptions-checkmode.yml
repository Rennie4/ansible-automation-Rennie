---
- name: Windows Server 2025 – Security Audit & S3 Report
  hosts: all
  gather_facts: yes
  vars:
    s3_bucket_name: "oml-s3-automation-sandbox"
    s3_region: "eu-west-1"
    # standardizing the output path on the AAP execution node
    local_report: "/tmp/Security_Options_Report_{{ inventory_hostname }}.html"

  tasks:
    - name: Audit CIS Item 2.52 (Interactive Logon)
      ansible.windows.win_powershell:
        script: |
          $path = "HKLM:\Software\Microsoft\Windows\CurrentVersion\Policies\System"
          $name = "DontDisplayLastUserName"
          $val = (Get-ItemProperty -Path $path -Name $name -ErrorAction SilentlyContinue).$name
          
          $status = if ($null -eq $val) { "Enabled" } elseif ($val -eq 0) { "Disabled" } else { "Not Defined" }
          return @{ 
            scan_results = @(
              "Interactive logon: Do not display last user name | $status"
            )
          }
      register: audit_results

    - name: Generate Local HTML
      delegate_to: localhost
      ansible.builtin.template:
        # FIXED: Using the double-dot to go up from 'playbooks/' to the project root where 'templates/' lives
        src: "{{ playbook_dir }}/../templates/security_report.j2"
        dest: "{{ local_report }}"
      vars:
        scan_lines: "{{ audit_results.output[0].scan_results }}"

    - name: Upload Report to S3
      delegate_to: localhost
      amazon.aws.s3_object:
        bucket: "{{ s3_bucket_name }}"
        object: "audits/{{ local_report | basename }}"
        src: "{{ local_report }}"
        mode: put
        region: "{{ s3_region }}"
