---
- name: Apply CIS Windows Server 2025 Security Options Hardening (Audit)
  hosts: all
  gather_facts: yes
  vars:
    s3_bucket_name: "oml-s3-automation-sandbox"
    s3_region: "eu-west-1"
    report_filename: "Security_Options_Audit_{{ inventory_hostname_short }}_{{ ansible_date_time.iso8601_basic_short }}.html"
    
    # Mapped from CIS Benchmark v1.0.0 PDF - Fixed YAML Syntax
    cis_security_options:
      - { name: "Interactive logon: Do not display last user name", path: "HKLM:\\Software\\Microsoft\\Windows\\CurrentVersion\\Policies\\System", value_name: "DontDisplayLastUserName", expected: 1 }
      - { name: "Accounts: Limit local account use of blank passwords", path: "HKLM:\\System\\CurrentControlSet\\Control\\Lsa", value_name: "LimitBlankPasswordUse", expected: 1 }
      - { name: "Microsoft network server: Digitally sign communications (always)", path: "HKLM:\\System\\CurrentControlSet\\Services\\LanmanServer\\Parameters", value_name: "RequireSecuritySignature", expected: 1 }
      - { name: "User Account Control: Run all administrators in Admin Approval Mode", path: "HKLM:\\Software\\Microsoft\\Windows\\CurrentVersion\\Policies\\System", value_name: "EnableLUA", expected: 1 }
      - { name: "Interactive logon: Machine inactivity limit", path: "HKLM:\\Software\\Microsoft\\Windows\\CurrentVersion\\Policies\\System", value_name: "InactivityTimeoutSecs", expected: 900 }
      - { name: "Network security: LDAP client encryption requirements", path: "HKLM:\\System\\CurrentControlSet\\Services\\LDAP", value_name: "LDAPClientIntegrity", expected: 1 }

  tasks:
    - name: Audit Security Options Registry Settings
      ansible.windows.win_powershell:
        script: |
          $cis_list = $input | ConvertFrom-Json
          $audit_results = @()
          foreach ($item in $cis_list) {
              $val = (Get-ItemProperty -Path $item.path -Name $item.value_name -ErrorAction SilentlyContinue).$($item.value_name)
              $actual = if ($null -eq $val) { "Not Defined" } else { $val }
              $audit_results += @{
                  FriendlyName = $item.name
                  ActualValue  = $actual
                  ExpectedValue = $item.expected
                  Status       = if ($actual.ToString() -eq $item.expected.ToString()) { "PASS" } else { "FAIL" }
              }
          }
          return @{ results = $audit_results }
        parameters:
          input: "{{ cis_security_options | to_json }}"
      register: sec_audit
      check_mode: no

    - name: Render Security Options Report
      delegate_to: localhost
      ansible.builtin.template:
        # Using relative pathing that works with standard Ansible structures
        src: "templates/Windows-2025-localPolicies-securityoptions-checkmode.j2"
        dest: "/tmp/{{ report_filename }}"
      vars:
        audit_data: "{{ sec_audit.output[0].results }}"
      check_mode: no

    - name: Upload to S3
      delegate_to: localhost
      amazon.aws.s3_object:
        bucket: "{{ s3_bucket_name }}"
        object: "security-options-audits/{{ report_filename }}"
        src: "/tmp/{{ report_filename }}"
        mode: put
        region: "{{ s3_region }}"
      check_mode: no
