---
# ================================================================
# Windows-2025-localPolicies-securityoptions-checkmode.yml
# Gathers CIS Security Options (2.38–2.101) using PowerShell script
# Outputs HTML and uploads result to your S3 bucket
# Runs in CHECK MODE (safe, non-intrusive)
# ================================================================

- name: "CIS Security Options - Windows Server 2025 (Check Mode)"
  hosts: windows
  gather_facts: no
  vars:
    script_path: "C:\\Temp\\Export-CIS-SecurityOptions-2.38-2.101.ps1"
    s3_bucket_uri: "s3://oml-s3-automation-sandbox/security-options-reports/"
    aws_exe_path: "C:\\Program Files\\Amazon\\AWSCLIV2\\aws.exe"
    region: "eu-west-1"

  tasks:

    # ------------------------------------------------------------
    # 1. Ensure C:\Temp exists
    # ------------------------------------------------------------
    - name: "Create Temp Directory"
      ansible.windows.win_file:
        path: C:\Temp
        state: directory
      check_mode: yes

    # ------------------------------------------------------------
    # 2. Copy the PowerShell CIS Script onto the Server
    # ------------------------------------------------------------
    - name: "Copy CIS Security Options Export Script"
      ansible.windows.win_copy:
        src: "./Export-CIS-SecurityOptions-2.38-2.101.ps1"
        dest: "{{ script_path }}"
      check_mode: yes

    # ------------------------------------------------------------
    # 3. Run The Script (Check Mode: Forces Non-Destructive)
    # ------------------------------------------------------------
    - name: "Execute CIS Security Options Script (Check Mode)"
      ansible.windows.win_shell: |
        PowerShell -ExecutionPolicy Bypass -File "{{ script_path }}" `
          -S3Uri "{{ s3_bucket_uri }}" `
          -AwsExe "{{ aws_exe_path }}" `
          -Region "{{ region }}"
      args:
        executable: powershell.exe
      register: script_output
      check_mode: yes

    # ------------------------------------------------------------
    # 4. Display Output
    # ------------------------------------------------------------
    - name: "Show Script Output"
      debug:
        msg: "{{ script_output.stdout_lines }}"
