---
- name: Windows Server 2025 – Security Options Discovery
  hosts: all
  gather_facts: yes
  vars:
    s3_bucket_name: "oml-s3-automation-sandbox"
    s3_region: "eu-west-1"
    report_filename: "Security_Options_Discovery_{{ inventory_hostname }}.html"
    local_temp_report: "/tmp/{{ report_filename }}"

  tasks:
    - name: Extract Actual Security Options via Secedit
      check_mode: no
      ansible.windows.win_shell: |
        $inf = "C:\Windows\Temp\audit.inf"
        secedit /export /cfg $inf /areas SECURITYPOLICY | Out-Null
        $data = Get-Content $inf
        Remove-Item $inf

        function Get-Setting($key) {
            $line = $data | Select-String "^$key\s*="
            if ($line) {
                $val = $line.ToString().Split('=')[1].Trim()
                if ($val -eq "0") { return "Disabled" }
                if ($val -eq "1") { return "Enabled" }
                return $val
            }
            return "Not Defined (Default)"
        }

        # Mapping to the exact names in your Local Policy UI snippet
        [PSCustomObject]@{
            "Accounts: Administrator account status" = Get-Setting "EnableAdminAccount"
            "Accounts: Guest account status"         = Get-Setting "EnableGuestAccount"
            "Accounts: Block Microsoft accounts"     = Get-Setting "NoConnectedUser"
            "Interactive logon: Do not display last user name" = Get-Setting "DontDisplayLastUserName"
        } | ConvertTo-Json
      register: raw_policy

    - name: Generate Discovery Report
      check_mode: no
      delegate_to: localhost
      ansible.builtin.copy:
        dest: "{{ local_temp_report }}"
        content: |
          <!DOCTYPE html>
          <html>
          <head>
              <style>
                  body { font-family: 'Segoe UI', sans-serif; margin: 40px; background: #f8f9fa; }
                  .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 900px; margin: auto; }
                  h1 { color: #2c3e50; border-bottom: 3px solid #34495e; padding-bottom: 10px; font-size: 24px; }
                  table { width: 100%; border-collapse: collapse; margin-top: 20px; }
                  th { background: #34495e; color: white; text-align: left; padding: 12px; }
                  td { padding: 12px; border-bottom: 1px solid #dee2e6; font-family: 'Consolas', monospace; color: #1e3a8a; font-weight: bold; }
                  .policy-name { color: #333; font-family: 'Segoe UI'; font-weight: normal; }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>Current Settings Discovery: {{ inventory_hostname }}</h1>
                  <p>Source: Local Policies \ Security Options</p>
                  <table>
                      <thead><tr><th>Policy Name</th><th>Current Security Setting</th></tr></thead>
                      <tbody>
                          {% set p = raw_policy.stdout | from_json %}
                          {% for key, value in p.items() %}
                          <tr>
                              <td class="policy-name">{{ key }}</td>
                              <td>{{ value }}</td>
                          </tr>
                          {% endfor %}
                      </tbody>
                  </table>
              </div>
          </body>
          </html>

    - name: Upload to S3
      check_mode: no
      delegate_to: localhost
      amazon.aws.s3_object:
        bucket: "{{ s3_bucket_name }}"
        object: "security-options-reports/{{ report_filename }}"
        src: "{{ local_temp_report }}"
        mode: put
        region: "{{ s3_region }}"
        endpoint_url: "https://s3.{{ s3_region }}.amazonaws.com"
