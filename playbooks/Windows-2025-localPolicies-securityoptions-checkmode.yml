---
- name: Apply CIS Windows Server 2025 Security Options Hardening (Audit)
  hosts: all
  gather_facts: yes
  vars:
    s3_bucket_name: "oml-s3-automation-sandbox"
    s3_region: "eu-west-1"
    report_filename: "Security_Options_Audit_{{ inventory_hostname }}_{{ ansible_date_time.iso8601_basic_short }}.html"

  tasks:
    - name: Audit Security Options Registry Settings
      ansible.windows.win_powershell:
        script: |
          $results = @{
              "DontDisplayLastUserName" = (Get-ItemProperty -Path "HKLM:\Software\Microsoft\Windows\CurrentVersion\Policies\System" -Name "DontDisplayLastUserName" -ErrorAction SilentlyContinue).DontDisplayLastUserName
              "LimitBlankPasswordUse"   = (Get-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Lsa" -Name "LimitBlankPasswordUse" -ErrorAction SilentlyContinue).LimitBlankPasswordUse
              "RequireSecuritySignature"= (Get-ItemProperty -Path "HKLM:\System\CurrentControlSet\Services\LanmanServer\Parameters" -Name "RequireSecuritySignature" -ErrorAction SilentlyContinue).RequireSecuritySignature
              "EnableLUA"               = (Get-ItemProperty -Path "HKLM:\Software\Microsoft\Windows\CurrentVersion\Policies\System" -Name "EnableLUA" -ErrorAction SilentlyContinue).EnableLUA
          }
          # Handle nulls for clean reporting
          $results.Keys | ForEach-Object { if ($null -eq $results[$_]) { $results[$_] = "Not Defined" } }
          return $results
      register: sec_audit
      check_mode: no

    - name: Render Security Options Report
      delegate_to: localhost
      ansible.builtin.template:
        src: "../templates/Windows-2025-localPolicies-securityoptions-checkmode.j2"
        dest: "/tmp/{{ report_filename }}"
      vars:
        # Using | first ensures we handle the list returned by win_powershell
        audit: "{{ sec_audit.output | first }}"
      check_mode: no

    - name: Upload to S3
      delegate_to: localhost
      amazon.aws.s3_object:
        bucket: "{{ s3_bucket_name }}"
        object: "security-options-audits/{{ report_filename }}"
        src: "/tmp/{{ report_filename }}"
        mode: put
        region: "{{ s3_region }}"
      check_mode: no
