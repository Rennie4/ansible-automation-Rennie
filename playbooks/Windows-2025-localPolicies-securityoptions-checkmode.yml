---
# =====================================================================
# Windows-2025-securityoptions-compare-and-publish.yml
# One playbook that:
#   1) Exports current Security Options (CIS 2.38–2.101 subset)
#   2) Compares them to a CIS baseline
#   3) Writes a human-readable diff to C:\Temp
#   4) Generates a per-host APPLY playbook (remediates only deltas)
#   5) Uploads both artifacts to S3 (fails loudly if upload doesn't occur)
#
# Safe to run as a Check job in AAP: key steps use check_mode: no.
# Requires: AWS CLI on the Windows host; valid creds for the WinRM user.
# =====================================================================

- name: "CIS Security Options (2.38–2.101): Compare & Publish to S3"
  hosts: windows_hosts
  gather_facts: no

  vars:
    # --- Windows temp paths ---
    win_temp_dir: "C:\\Temp"
    inf_path:     "C:\\Temp\\SecExport.inf"
    diff_win:     "C:\\Temp\\CIS_SecOptions_diff.txt"
    apply_win:    "C:\\Temp\\Windows-2025-apply-securityoptions.yml"

    # --- AWS / S3 ---
    region: "eu-west-1"
    aws_exe_path: "C:\\Program Files\\Amazon\\AWSCLIV2\\aws.exe"
    s3_bucket_uri: "s3://oml-s3-automation-sandbox/security-options-reports/"
    # S3 prefix layout (per host)
    s3_prefix_diff:  "diffs/{{ inventory_hostname }}/"
    s3_prefix_apply: "apply/{{ inventory_hostname }}/"

    # --- CIS baseline (subset) ---
    # Extend as needed by adding more entries to 'cis_baseline'.
    cis_baseline:
      # Special
      - { id: "2.38",  type: special,   key: guest_status, desired: "Disabled" }
      # LSA & core
      - { id: "2.39",  type: reg_dword, root: HKLM, path: "System\\CurrentControlSet\\Control\\Lsa", name: "LimitBlankPasswordUse", desired: 1 }
      - { id: "2.43",  type: reg_dword, root: HKLM, path: "System\\CurrentControlSet\\Control\\Lsa", name: "CrashOnAuditFail",       desired: 0 }
      - { id: "2.74",  type: reg_dword, root: HKLM, path: "System\\CurrentControlSet\\Services\\LanManServer\\Parameters", name: "RestrictNullSessAccess", desired: 1 }
      - { id: "2.77",  type: reg_dword, root: HKLM, path: "System\\CurrentControlSet\\Control\\Lsa", name: "ForceGuest", desired: 0 }
      - { id: "2.82",  type: reg_dword, root: HKLM, path: "System\\CurrentControlSet\\Control\\Lsa", name: "NoLMHash",  desired: 1 }
