<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Full Security Options Audit</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 40px; background-color: #f0f2f5; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { color: #1a202c; border-bottom: 3px solid #005a9e; padding-bottom: 10px; }
        .meta { margin-bottom: 20px; color: #4a5568; font-size: 0.9em; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; table-layout: fixed; }
        th { background-color: #005a9e; color: white; padding: 12px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #e2e8f0; font-size: 0.85em; word-wrap: break-word; }
        tr:nth-child(even) { background-color: #f8fafc; }
        .value-cell { font-family: 'Consolas', monospace; color: #2d3748; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Windows Server 2025: Security Options Inventory</h1>
        <div class="meta">
            <strong>Server:</strong> {{ inventory_hostname }}<br>
            <strong>Audit Date:</strong> {{ ansible_date_time.date_time }}<br>
            <strong>Total Settings Found:</strong> {{ all_options | length }}
        </div>

        <table>
            <thead>
                <tr>
                    <th style="width: 70%;">Registry Path / Policy Name</th>
                    <th style="width: 30%;">Effective Setting (Value)</th>
                </tr>
            </thead>
            <tbody>
                {% for item in all_options %}
                <tr>
                    <td>{{ item.Key }}</td>
                    <td class="value-cell">{{ item.Value }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
