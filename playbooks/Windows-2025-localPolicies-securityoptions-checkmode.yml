---
# =====================================================================
# Windows-2025-localPolicies-securityoptions-checkmode.yml
# Gathers CIS Security Options (2.38–2.101) from Windows Server 2025
# Generates HTML report and uploads to S3 bucket
# Uses WinRM and your existing inventory group: [windows_hosts]
# =====================================================================

- name: "CIS Security Options - Windows Server 2025 (Check Mode)"
  hosts: windows_hosts
  gather_facts: no

  vars:
    script_path: "C:\\Temp\\Export-CIS-SecurityOptions-2.38-2.101.ps1"
    s3_bucket_uri: "s3://oml-s3-automation-sandbox/security-options-reports/"
    aws_exe_path: "C:\\Program Files\\Amazon\\AWSCLIV2\\aws.exe"
    region: "eu-west-1"

  tasks:

    # ------------------------------------------------------------
    # Ensure the Temp folder exists
    # ------------------------------------------------------------
    - name: "Create C:\\Temp directory"
      ansible.windows.win_file:
        path: C:\Temp
        state: directory
      check_mode: yes

    # ------------------------------------------------------------
    # Copy PowerShell script to Windows host
    # ------------------------------------------------------------
    - name: "Copy CIS export PowerShell script"
      ansible.windows.win_copy:
        src: "./Export-CIS-SecurityOptions-2.38-2.101.ps1"
        dest: "{{ script_path }}"
      check_mode: yes

    # ------------------------------------------------------------
    # Run the script (Check Mode = safe, non-intrusive)
    # ------------------------------------------------------------
    - name: "Execute CIS Security Options Export Script (Check Mode)"
      ansible.windows.win_shell: |
        PowerShell -ExecutionPolicy Bypass -File "{{ script_path }}" `
          -S3Uri "{{ s3_bucket_uri }}" `
          -AwsExe "{{ aws_exe_path }}" `
          -Region "{{ region }}"
      args:
        executable: powershell.exe
      register: script_output
      check_mode: yes

    # ------------------------------------------------------------
    # Show Task Output
    # ------------------------------------------------------------
    - name: "Display script output"
      debug:
        msg: "{{ script_output.stdout_lines }}"
