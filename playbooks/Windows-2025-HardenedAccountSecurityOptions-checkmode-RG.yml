---
- name: CIS Windows Server 2025 Security Options Audit (CIS L1) - RG
  hosts: all
  gather_facts: yes

  vars:
    s3_bucket_name: "oml-s3-automation-sandbox"
    s3_region: "eu-west-1"
    report_filename: "SecurityOptions_CIS_Audit_{{ inventory_hostname }}_{{ ansible_date_time.iso8601_basic_short }}.html"

  tasks:

    - name: Audit Security Options (Force Run, Read-Only)
      win_shell: |
        $ErrorActionPreference = "Stop"

        #
        # 1) Read Local Security Policy (secedit snapshot)
        #
        $tempFile = "C:\Windows\Temp\secedit_security.inf"
        secedit /export /cfg $tempFile /areas SECURITYPOLICY | Out-Null
        $policy = Get-Content $tempFile -ErrorAction SilentlyContinue
        if (Test-Path $tempFile) { Remove-Item $tempFile -Force -ErrorAction SilentlyContinue }

        function Get-Val($key) {
            $line = $policy | Select-String "^$key\s*=" -ErrorAction SilentlyContinue
            if ($line) { return $line.ToString().Split('=')[1].Trim() }
            return $null
        }

        #
        # 2) Registry helpers
        #
        function Get-REGDWORD($Path, $Name) {
            try {
                $v = (Get-ItemProperty -Path $Path -Name $Name -ErrorAction Stop).$Name
                return [int]$v
            } catch { return $null }
        }

        function Get-REGSZ($Path, $Name) {
            try { return (Get-ItemProperty -Path $Path -Name $Name -ErrorAction Stop).$Name }
            catch { return $null }
        }

        function Map-Bool($v, [switch]$Invert) {
            if ($v -eq $null) { return "Not Defined" }
            if ($Invert) { return ($v -eq 0) ? "Enabled" : "Disabled" }
            return ($v -eq 1) ? "Enabled" : "Disabled"
        }

        #
        # 3) ACCOUNTS (CIS)
        #
        $EnableAdminAccount   = Get-Val "EnableAdminAccount"      # 0/1
        $EnableGuestAccount   = Get-Val "EnableGuestAccount"
        $NewAdministratorName = Get-Val "NewAdministratorName"
        $NewGuestName         = Get-Val "NewGuestName"

        $LimitBlankPasswordUse = Get-REGDWORD "HKLM:\SYSTEM\CurrentControlSet\Control\Lsa" "LimitBlankPasswordUse"

        $Accounts = [PSCustomObject]@{
            AdministratorStatus = if ($EnableAdminAccount -eq "1") {"Enabled"} elseif ($EnableAdminAccount -eq "0") {"Disabled"} else {"Not Defined"}
            GuestStatus         = if ($EnableGuestAccount -eq "1") {"Enabled"} elseif ($EnableGuestAccount -eq "0") {"Disabled"} else {"Not Defined"}
            RenameAdmin         = if ($NewAdministratorName) { $NewAdministratorName } else { "Not Defined" }
            RenameGuest         = if ($NewGuestName)         { $NewGuestName }         else { "Not Defined" }
            LimitBlankPasswords = Map-Bool $LimitBlankPasswordUse
        }

        #
        # 4) INTERACTIVE LOGON (CIS)
        #
        $polSys = "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System"
        $ntWin  = "HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon"

        $DisableCAD               = Get-REGDWORD $polSys "DisableCAD"
        $DontDisplayLastUserName  = Get-REGDWORD $polSys "DontDisplayLastUserName"
        $DontDisplayLastSignin    = Get-REGDWORD $polSys "DontDisplayLastSignin"
        $InactivityTimeoutSecs    = Get-REGDWORD $polSys "InactivityTimeoutSecs"

        $LegalNoticeCaption       = Get-REGSZ   $polSys "LegalNoticeCaption"
        $LegalNoticeText          = Get-REGSZ   $polSys "LegalNoticeText"

        $PasswordExpiryWarning    = Get-REGDWORD $ntWin "PasswordExpiryWarning"
        $ForceUnlockLogon         = Get-REGDWORD $ntWin "ForceUnlockLogon"
        $ScRemoveOption           = Get-REGDWORD $ntWin "ScRemoveOption"

        switch ($ScRemoveOption) {
          0 { $ScStr = "No action" }
          1 { $ScStr = "Lock workstation" }
          2 { $ScStr = "Force logoff" }
          3 { $ScStr = "Disconnect RDP session" }
          default { $ScStr = "Not Defined" }
        }

        $InteractiveLogon = [PSCustomObject]@{
            DoNotRequireCtrlAltDel         = Map-Bool $DisableCAD
            DoNotDisplayLastUserName       = Map-Bool $DontDisplayLastUserName
            DontDisplayLastSignin          = Map-Bool $DontDisplayLastSignin
            MachineInactivityLimitSeconds  = if ($InactivityTimeoutSecs -eq $null) {"Not Defined"} else { $InactivityTimeoutSecs }
            LogonBannerTitle               = if ($LegalNoticeCaption) {"Configured"} else {"Not Configured"}
            LogonBannerText                = if ($LegalNoticeText)    {"Configured"} else {"Not Configured"}
            PasswordExpiryWarningDays      = if ($PasswordExpiryWarning -eq $null) {"Not Defined"} else { $PasswordExpiryWarning }
            RequireDCAuthToUnlock          = Map-Bool $ForceUnlockLogon
            SmartCardRemovalBehavior       = $ScStr
        }

        #
        # 5) NETWORK SECURITY  (from earlier working version)
        #
        $LmCompatibilityLevel = Get-REGDWORD "HKLM:\SYSTEM\CurrentControlSet\Control\Lsa" "LmCompatibilityLevel"
        switch ($LmCompatibilityLevel) {
          5 { $LmStr = "Send NTLMv2 response only. Refuse LM & NTLM" }
          3 { $LmStr = "Send NTLMv2 response only" }
          2 { $LmStr = "Send NTLM response only" }
          1 { $LmStr = "Send LM & NTLM responses" }
          0 { $LmStr = "Send LM & NTLM responses" }
          default { $LmStr = "Not Defined" }
        }

        $NTLMMinClientSec = Get-REGDWORD "HKLM:\SYSTEM\CurrentControlSet\Control\Lsa\MSV1_0" "NTLMMinClientSec"
        $NTLMMinServerSec = Get-REGDWORD "HKLM:\SYSTEM\CurrentControlSet\Control\Lsa\MSV1_0" "NTLMMinServerSec"

        function Map-NtlmMask($v) {
            if ($v -eq $null) { return "Not Defined" }
            $o = @()
            if ($v -band 0x00020000) { $o += "Require NTLMv2" }
            if ($v -band 0x00800000 -or $v -band 0x00200000) { $o += "Require 128-bit" }
            if ($o.Count -eq 0) { return "$v" }
            return ($o -join ", ")
        }

        $NetworkSecurity = [PSCustomObject]@{
            LanManagerAuthenticationLevel = $LmStr
            NtlmMinClientSec              = Map-NtlmMask $NTLMMinClientSec
            NtlmMinServerSec              = Map-NtlmMask $NTLMMinServerSec
        }

        #
        # Assemble final object
        #
        $Audit = [PSCustomObject]@{
            Accounts          = $Accounts
            InteractiveLogon  = $InteractiveLogon
            NetworkSecurity   = $NetworkSecurity
        }

        $Audit | ConvertTo-Json -Depth 6
      register: security_audit
      check_mode: no


    - name: Render Security Options HTML Report
      delegate_to: localhost
      template:
        src: "../templates/Windows-2025-HardenedAccountSecurityOptions-checkmode.j2"
        dest: "/tmp/{{ report_filename }}"
      vars:
        audit: "{{ security_audit.stdout | from_json }}"
      check_mode: no


    - name: Upload Security Options Report to S3
      delegate_to: localhost
      amazon.aws.s3_object:
        bucket: "{{ s3_bucket_name }}"
        object: "cis-baseline-files/{{ report_filename }}"
        src: "/tmp/{{ report_filename }}"
        mode: put
        region: "{{ s3_region }}"
      check_mode: no
