---
- name: Apply CIS Windows Server 2025 Account Security Options Audit (Partial Suite)
  hosts: all
  gather_facts: yes
  vars:
    s3_bucket_name: "oml-s3-automation-sandbox"
    s3_region: "eu-west-1"
    report_filename: "SecurityOptions_CIS_Audit_{{ inventory_hostname }}_{{ ansible_date_time.iso8601_basic_short }}.html"

  tasks:

    - name: Audit Account Security Options (Correct Display Values)
      win_shell: |
        $ErrorActionPreference = "Stop"

        # --- Export SECURITYPOLICY ---
        $tempFile = "C:\Windows\Temp\secedit_audit.inf"
        secedit /export /cfg $tempFile /areas SECURITYPOLICY | Out-Null
        $policy = Get-Content $tempFile -Raw -Encoding Unicode
        Remove-Item $tempFile -Force -ErrorAction SilentlyContinue

        # Helper: read values from secedit output
        function Get-Val($key) {
            $m = [regex]::Match($policy, "^(?:\s*)$([regex]::Escape($key))\s*=\s*(.*)$", 'Multiline, IgnoreCase')
            if ($m.Success) { return $m.Groups[2].Value.Trim() }
            return $null
        }

        # Helper: convert to GUI-style display name
        function To-Display($v) {
            if ($null -eq $v) { return "Not Defined" }
            if ($v -as [int]) {
                if ([int]$v -eq 1) { return "Enabled" }
                if ([int]$v -eq 0) { return "Disabled" }
            }
            return $v
        }

        # --- secedit values ---
        $adminRaw  = Get-Val "EnableAdminAccount"
        $guestRaw  = Get-Val "EnableGuestAccount"
        $renameRaw = Get-Val "NewAdministratorName"

        # --- registry value (not in secedit) ---
        try {
            $limit = (Get-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\Lsa" -Name "LimitBlankPasswordUse").LimitBlankPasswordUse
            $limitDisplay = To-Display $limit
        } catch {
            $limitDisplay = "Not Defined"
        }

        # --- FINAL JSON (keys MUST match J2 template EXACTLY) ---
        @{
            AdministratorStatus = To-Display $adminRaw
            GuestStatus         = To-Display $guestRaw
            RenameAdmin         = $renameRaw
            LimitBlankPasswords = $limitDisplay
            GeneratedAt         = (Get-Date).ToString("yyyy-MM-dd HH:mm:ss")
        } | ConvertTo-Json
      register: secopt_audit
      check_mode: no
      tags: ['audit','security_options']

    - name: Render Security Options Report
      delegate_to: localhost
      template:
        src: "../templates/Windows-2025-HardenedAccountSecurityOptions-checkmode.j2"
        dest: "/tmp/{{ report_filename }}"
      vars:
        audit: "{{ secopt_audit.stdout | from_json }}"
      check_mode: no
      tags: ['report','security_options']

    - name: Upload to S3
      delegate_to: localhost
      amazon.aws.s3_object:
        bucket: "{{ s3_bucket_name }}"
        object: "cis-baseline-files/security-options/{{ report_filename }}"
        src: "/tmp/{{ report_filename }}"
        mode: put
        region: "{{ s3_region }}"
      check_mode: no
      tags: ['upload','security_options']

    - name: Show S3 location
      delegate_to: localhost
      debug:
        msg: "Uploaded: s3://{{ s3_bucket_name }}/cis-baseline-files/security-options/{{ report_filename }}"
      tags: ['upload','security_options']
