---
- name: Windows 2025 Hardened Account Security Options (CIS L1) - CHECK MODE - RG
  hosts: windows
  gather_facts: yes
  any_errors_fatal: true

  # NOTE: Although this file has a .j2 extension, we keep it as a plain YAML vars file.
  vars_files:
    - Windows-2025-HardenedAccountSecurityOptions-checkmode.j2

  # Summary message used after each section
  vars:
    _section_summary: |
      Section '{{ section_name }}' → Total={{ section_items | length }},
      Changed={{ (section_results.results | selectattr('changed') | list) | length }},
      Failed={{ (section_results.results | selectattr('failed', 'defined') | selectattr('failed') | list) | length }}

  tasks:

    # ---------------------------
    # 1) ACCOUNTS
    # ---------------------------
    - name: "Section 1: Accounts - registry (CHECK MODE)"
      ansible.windows.win_regedit:
        path: "{{ item.path }}"
        name: "{{ item.name }}"
        data: "{{ item.data }}"
        type: "{{ item.type | default('dword') }}"
      loop: "{{ security_options.accounts | default([]) | selectattr('provider', 'equalto', 'registry') | list }}"
      loop_control:
        label: "{{ item.path }}\\{{ item.name }} => {{ item.data }}"
      check_mode: yes
      register: section_results
      vars:
        section_name: "Accounts"
        section_items: "{{ security_options.accounts | default([]) }}"
    - name: "Section 1 Summary"
      debug:
        msg: "{{ _section_summary }}"

    - name: "Section 1: Accounts - secedit (CHECK MODE)"
      ansible.windows.win_security_policy:
        section: "{{ item.section }}"
        name: "{{ item.policy_name }}"
        value: "{{ item.value }}"
      loop: "{{ security_options.accounts | default([]) | selectattr('provider', 'equalto', 'secedit') | list }}"
      loop_control:
        label: "{{ item.section }} :: {{ item.policy_name }} => {{ item.value }}"
      check_mode: yes

    # ---------------------------
    # 2) INTERACTIVE LOGON
    # ---------------------------
    - name: "Section 2: Interactive logon - registry (CHECK MODE)"
      ansible.windows.win_regedit:
        path: "{{ item.path }}"
        name: "{{ item.name }}"
        data: "{{ item.data }}"
        type: "{{ item.type | default('dword') }}"
      loop: "{{ security_options.interactive_logon | default([]) | selectattr('provider','equalto','registry') | list }}"
      loop_control:
        label: "{{ item.path }}\\{{ item.name }} => {{ item.data }}"
      check_mode: yes
      register: section_results
      vars:
        section_name: "Interactive logon"
        section_items: "{{ security_options.interactive_logon | default([]) }}"
    - name: "Section 2 Summary"
      debug: { msg: "{{ _section_summary }}" }

    - name: "Section 2: Interactive logon - secedit (CHECK MODE)"
      ansible.windows.win_security_policy:
        section: "{{ item.section }}"
        name: "{{ item.policy_name }}"
        value: "{{ item.value }}"
      loop: "{{ security_options.interactive_logon | default([]) | selectattr('provider','equalto','secedit') | list }}"
      loop_control:
        label: "{{ item.section }} :: {{ item.policy_name }} => {{ item.value }}"
      check_mode: yes

    # ---------------------------
    # 3) NETWORK SECURITY
    # ---------------------------
