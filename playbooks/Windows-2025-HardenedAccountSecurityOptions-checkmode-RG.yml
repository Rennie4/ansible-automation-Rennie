---
- name: CIS Windows Server 2025 Security Options Audit (CIS L1) - RG
  hosts: all
  gather_facts: yes

  vars:
    s3_bucket_name: "oml-s3-automation-sandbox"
    s3_region: "eu-west-1"
    report_filename: "SecurityOptions_CIS_Audit_{{ inventory_hostname }}_{{ ansible_date_time.iso8601_basic_short }}.html"

  tasks:

    # ---------------------------
    # 1) ACCOUNTS
    # ---------------------------
    - name: Audit Accounts CIS Section
      win_shell: |
        $ErrorActionPreference = "Stop"

        $tmp = "C:\Windows\Temp\accts.inf"
        secedit /export /cfg $tmp /areas SECURITYPOLICY | Out-Null
        $pol = Get-Content $tmp -ErrorAction SilentlyContinue
        if (Test-Path $tmp) { Remove-Item $tmp -Force -ErrorAction SilentlyContinue }

        function Get-Val($key) {
            $line = $pol | Select-String "^$key\s*=" -ErrorAction SilentlyContinue
            if ($line) { return $line.ToString().Split("=")[1].Trim() }
            return $null
        }

        function Get-DWORD($path,$name) {
            try { return (Get-ItemProperty -Path $path -Name $name -ErrorAction Stop).$name }
            catch { return $null }
        }

        $EnableAdmin = Get-Val "EnableAdminAccount"
        $EnableGuest = Get-Val "EnableGuestAccount"
        $RenameAdmin = Get-Val "NewAdministratorName"
        $RenameGuest = Get-Val "NewGuestName"
        $BlankPw     = Get-DWORD "HKLM:\SYSTEM\CurrentControlSet\Control\Lsa" "LimitBlankPasswordUse"

        @{
            AdministratorStatus = if ($EnableAdmin -eq "1") {"Enabled"} elseif ($EnableAdmin -eq "0") {"Disabled"} else {"Not Defined"}
            GuestStatus         = if ($EnableGuest -eq "1") {"Enabled"} elseif ($EnableGuest -eq "0") {"Disabled"} else {"Not Defined"}
            RenameAdmin         = if ($RenameAdmin) {$RenameAdmin} else {"Not Defined"}
            RenameGuest         = if ($RenameGuest) {$RenameGuest} else {"Not Defined"}
            LimitBlankPasswords = if ($BlankPw -eq 1) {"Enabled"} elseif ($BlankPw -eq 0) {"Disabled"} else {"Not Defined"}
        } | ConvertTo-Json -Depth 3
      register: accounts_audit
      check_mode: no

    # ---------------------------
    # 2) INTERACTIVE LOGON
    # ---------------------------
    - name: Audit Interactive Logon CIS Section
      win_shell: |
        $ErrorActionPreference = "Stop"

        function Get-DWORD($path,$name) {
            try { return (Get-ItemProperty -Path $path -Name $name -ErrorAction Stop).$name }
            catch { return $null }
        }

        function Get-SZ($path,$name) {
            try { return (Get-ItemProperty -Path $path -Name $name -ErrorAction Stop).$name }
            catch { return $null }
        }

        $polSys = "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System"
        $ntWin  = "HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon"

        $DisableCAD      = Get-DWORD $polSys "DisableCAD"
        $ShowLastUser    = Get-DWORD $polSys "DontDisplayLastUserName"
        $ShowLastSignin  = Get-DWORD $polSys "DontDisplayLastSignin"
        $Inactivity      = Get-DWORD $polSys "InactivityTimeoutSecs"
        $Title           = Get-SZ    $polSys "LegalNoticeCaption"
        $Text            = Get-SZ    $polSys "LegalNoticeText"
        $PwWarn          = Get-DWORD $ntWin  "PasswordExpiryWarning"
        $ForceUnlock     = Get-DWORD $ntWin  "ForceUnlockLogon"
        $ScOption        = Get-DWORD $ntWin  "ScRemoveOption"

        switch ($ScOption) {
          0 { $ScBehavior = "No action" }
          1 { $ScBehavior = "Lock workstation" }
          2 { $ScBehavior = "Force logoff" }
          3 { $ScBehavior = "Disconnect RDP session" }
          default { $ScBehavior = "Not Defined" }
        }

        @{
            DoNotRequireCtrlAltDel        = if ($DisableCAD -eq 1) {"Enabled"} else {"Disabled"}
            DoNotDisplayLastUserName      = if ($ShowLastUser -eq 1) {"Enabled"} else {"Disabled"}
            DontDisplayLastSignin         = if ($ShowLastSignin -eq 1) {"Enabled"} else {"Disabled"}
            MachineInactivityLimitSeconds = if ($Inactivity -ne $null) {$Inactivity} else {"Not Defined"}
            LogonBannerTitle              = if ($Title) {"Configured"} else {"Not Configured"}
            LogonBannerText               = if ($Text)  {"Configured"} else {"Not Configured"}
            PasswordExpiryWarningDays     = if ($PwWarn -ne $null) {$PwWarn} else {"Not Defined"}
            RequireDCAuthToUnlock         = if ($ForceUnlock -eq 1) {"Enabled"} else {"Disabled"}
            SmartCardRemovalBehavior      = $ScBehavior
        } | ConvertTo-Json -Depth 3
      register: ilogon_audit
      check_mode: no

    # ---------------------------
    # 3) NETWORK SECURITY
    # ---------------------------
    - name: Audit Network Security CIS Section
      win_shell: |
        $ErrorActionPreference = "Stop"

        function Get-DWORD($path,$name) {
            try { return (Get-ItemProperty -Path $path -Name $name -ErrorAction Stop).$name }
            catch { return $null }
        }

        $Lm = Get-DWORD "HKLM:\SYSTEM\CurrentControlSet\Control\Lsa" "LmCompatibilityLevel"
        switch ($Lm) {
          5 { $LmStr = "Send NTLMv2 response only. Refuse LM & NTLM" }
          3 { $LmStr = "Send NTLMv2 response only" }
          2 { $LmStr = "Send NTLM response only" }
          1 { $LmStr = "Send LM & NTLM responses" }
          0 { $LmStr = "Send LM & NTLM responses" }
          default { $LmStr = "Not Defined" }
        }

        $Client = Get-DWORD "HKLM:\SYSTEM\CurrentControlSet\Control\Lsa\MSV1_0" "NTLMMinClientSec"
        $Server = Get-DWORD "HKLM:\SYSTEM\CurrentControlSet\Control\Lsa\MSV1_0" "NTLMMinServerSec"

        function Map-Ntlm($v) {
            if ($v -eq $null) { return "Not Defined" }
            $o = @()
            if ($v -band 0x00020000) { $o += "Require NTLMv2" }
            if ($v -band 0x00800000 -or $v -band 0x00200000) { $o += "Require 128-bit" }
            if ($o.Count -eq 0) { return "$v" }
            return ($o -join ", ")
        }

        @{
            LanManagerAuthenticationLevel = $LmStr
            NtlmMinClientSec              = Map-Ntlm $Client
            NtlmMinServerSec              = Map-Ntlm $Server
        } | ConvertTo-Json -Depth 3
      register: netsec_audit
      check_mode: no

    # ---------------------------
    # 4) Merge → 5) Render → 6) Upload
    # ---------------------------
    - name: Merge results
      set_fact:
        audit_merged:
          Accounts: "{{ accounts_audit.stdout | from_json }}"
          InteractiveLogon: "{{ ilogon_audit.stdout | from_json }}"
          NetworkSecurity: "{{ netsec_audit.stdout | from_json }}"

    - name: Render HTML report
      delegate_to: localhost
      template:
        src: "../templates/Windows-2025-HardenedAccountSecurityOptions-checkmode.j2"
        dest: "/tmp/{{ report_filename }}"
      vars:
        audit: "{{ audit_merged }}"
      check_mode: no

    - name: Upload to S3
      delegate_to: localhost
      amazon.aws.s3_object:
        bucket: "{{ s3_bucket_name }}"
        object: "cis-baseline-files/{{ report_filename }}"
        src: "/tmp/{{ report_filename }}"
        mode: put
        region: "{{ s3_region }}"
      check_mode: no
