security_options:

  # 1) Accounts
  accounts:
    # Example: Limit local account use of blank passwords to console logon only = Enabled
    - provider: registry
      path: HKLM:\SYSTEM\CurrentControlSet\Control\Lsa
      name: LimitBlankPasswordUse
      type: dword
      data: 1

    # Example: Administrator account status = Disabled (secedit-backed)
    - provider: secedit
      section: "System Access"
      policy_name: "Accounts: Administrator account status"
      value: "Disabled"

    # Example: Guest account status = Disabled (secedit-backed)
    - provider: secedit
      section: "System Access"
      policy_name: "Accounts: Guest account status"
      value: "Disabled"

    # Example: Rename administrator account = LocalAdmin-RG
    - provider: secedit
      section: "System Access"
      policy_name: "Accounts: Rename administrator account"
      value: "LocalAdmin-RG"

    # Example: Rename guest account = Guest-RG
    - provider: secedit
      section: "System Access"
      policy_name: "Accounts: Rename guest account"
      value: "Guest-RG"

  # 2) Interactive logon
  interactive_logon:
    # Do not display last user name = Enabled
    - provider: registry
      path: HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System
      name: DontDisplayLastUserName
      type: dword
      data: 1

    # Do not require CTRL+ALT+DEL = Disabled (so require CTRL+ALT+DEL)
    - provider: registry
      path: HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System
      name: DisableCAD
      type: dword
      data: 0

  # 3) Network security
  network_security:
    # LAN Manager authentication level = Send NTLMv2 response only. Refuse LM & NTLM (DWORD 5)
    - provider: registry
      path: HKLM:\SYSTEM\CurrentControlSet\Control\Lsa
      name: LmCompatibilityLevel
      type: dword
      data: 5

    # Minimum session security for NTLM SSP based clients = Require NTLMv2 + 128-bit
    # Bitmask: 0x20000 (NTLMv2) + 0x800000 (128-bit) = 0x82000
    - provider: registry
      path: HKLM:\SYSTEM\CurrentControlSet\Control\Lsa\MSV1_0
      name: NTLMMinClientSec
      type: dword
      data: 532480  # 0x82000

    # Minimum session security for NTLM SSP based servers = Require NTLMv2 + 128-bit
    - provider: registry
      path: HKLM:\SYSTEM\CurrentControlSet\Control\Lsa\MSV1_0
      name: NTLMMinServerSec
      type: dword
      data: 532480  # 0x82000

  # 4) Microsoft network client
  microsoft_network_client:
    # Digitally sign communications (always) = Enabled
    - provider: registry
      path: HKLM:\SYSTEM\CurrentControlSet\Services\LanmanWorkstation\Parameters
      name: RequireSecuritySignature
      type: dword
      data: 1

    # Digitally sign communications (if client agrees) = Enabled
    - provider: registry
      path: HKLM:\SYSTEM\CurrentControlSet\Services\LanmanWorkstation\Parameters
      name: EnableSecuritySignature
      type: dword
      data: 1

  # 5) Microsoft network server
  microsoft_network_server:
    # Digitally sign communications (always) = Enabled
    - provider: registry
      path: HKLM:\SYSTEM\CurrentControlSet\Services\LanmanServer\Parameters
      name: RequireSecuritySignature
      type: dword
      data: 1

    # Digitally sign communications (if client agrees) = Enabled
    - provider: registry
      path: HKLM:\SYSTEM\CurrentControlSet\Services\LanmanServer\Parameters
      name: EnableSecuritySignature
      type: dword
      data: 1

    # Disable SMBv1 (Server)
    - provider: registry
      path: HKLM:\SYSTEM\CurrentControlSet\Services\LanmanServer\Parameters
      name: SMB1
      type: dword
      data: 0

  # 6) Domain member (secure channel)
  domain_member:
    # Digitally encrypt or sign secure channel data (always) and hardening flags
    - provider: registry
      path: HKLM:\SYSTEM\CurrentControlSet\Services\Netlogon\Parameters
      name: RequireSignOrSeal
      type: dword
      data: 1
    - provider: registry
      path: HKLM:\SYSTEM\CurrentControlSet\Services\Netlogon\Parameters
      name: SealSecureChannel
      type: dword
      data: 1
    - provider: registry
      path: HKLM:\SYSTEM\CurrentControlSet\Services\Netlogon\Parameters
      name: SignSecureChannel
      type: dword
      data: 1
    - provider: registry
      path: HKLM:\SYSTEM\CurrentControlSet\Services\Netlogon\Parameters
      name: RequireStrongKey
      type: dword
      data: 1
    - provider: registry
      path: HKLM:\SYSTEM\CurrentControlSet\Services\Netlogon\Parameters
      name: DisablePasswordChange
      type: dword
      data: 0

  # 7) Devices
  devices:
    # Prevent users from installing printer drivers = Enabled
    - provider: registry
      path: HKLM:\SYSTEM\CurrentControlSet\Control\Print\Providers\LanMan Print Services\Servers
      name: AddPrinterDrivers
      type: dword
      data: 1

  # 8) UAC (User Account Control)
  uac:
    # Run all administrators in Admin Approval Mode = Enabled
    - provider: registry
      path: HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System
      name: EnableLUA
      type: dword
      data: 1

    # Admin Approval Mode for built-in Administrator = Enabled
    - provider: registry
      path: HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System
      name: FilterAdministratorToken
      type: dword
      data: 1

    # Behavior of the elevation prompt for admins = Prompt for consent on the secure desktop
    # ConsentPromptBehaviorAdmin: 0=No prompt, 1=Prompt on secure desktop for credentials, 2=Prompt for consent on secure desktop, 5/Prompt variations
    - provider: registry
      path: HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System
      name: ConsentPromptBehaviorAdmin
      type: dword
      data: 2

    # Switch to secure desktop when prompting = Enabled
    - provider: registry
      path: HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System
      name: PromptOnSecureDesktop
      type: dword
      data: 1

    # Detect application installations and prompt for elevation = Enabled
    - provider: registry
      path: HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System
      name: EnableInstallerDetection
      type: dword
      data: 1

  # 9) LDAP client signing
  ldap_client_signing:
    # LDAP client signing requirements = Require signing (2)
    - provider: registry
      path: HKLM:\SYSTEM\CurrentControlSet\Services\LDAP
      name: LDAPClientIntegrity
      type: dword
      data: 2

  # 10) Network access (anonymous restrictions / shares / named pipes)
  network_access:
    # Restrict anonymous access to Named Pipes and Shares = Enabled (RestrictNullSessAccess=1)
    - provider: registry
      path: HKLM:\SYSTEM\CurrentControlSet\Services\LanmanServer\Parameters
      name: RestrictNullSessAccess
      type: dword
      data: 1

    # NullSessionPipes = (empty) — represent empty REG_MULTI_SZ as [] using win_regedit (not all versions support multi_sz well in one line; keep for reference)
    # - provider: registry
    #   path: HKLM:\SYSTEM\CurrentControlSet\Services\LanmanServer\Parameters
    #   name: NullSessionPipes
    #   type: multistring
    #   data: []

    # NullSessionShares = (empty)
    # - provider: registry
    #   path: HKLM:\SYSTEM\CurrentControlSet\Services\LanmanServer\Parameters
    #   name: NullSessionShares
    #   type: multistring
    #   data: []
``
