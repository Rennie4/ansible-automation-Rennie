---
- name: Apply CIS Windows Server 2025 Security Options (Enforce 2.38–2.41) - RG
  hosts: all
  gather_facts: yes

  vars:
    # === Org policy: Do NOT rename built-in accounts by default ===
    apply_cis_240: false   # Rename Administrator (CIS 2.40) -> OFF
    apply_cis_241: false   # Rename Guest (CIS 2.41) -> OFF

    # If you ever allow renaming later, set the above to true and set these:
    cis_admin_new_name: "LocalAdmin_Renamed"
    cis_guest_new_name: "LocalGuest_Renamed"

    # Artifact name
    report_filename: "CIS_2.38-2.41_Enforcement_{{ inventory_hostname }}_{{ ansible_date_time.iso8601_basic_short }}.html"

    # Report template path (top-level templates/ in your repo)
    report_template_path: "{{ playbook_dir }}/../templates/CIS-2.38-2.41-ENFORCE-report.j2"

  tasks:

    # ----------------------------------------------------------------
    # ENFORCE: CIS 2.38 — Guest account Disabled (idempotent)
    # ----------------------------------------------------------------
    - name: "CIS 2.38 | Disable built-in Guest account"
      ansible.windows.win_user:
        name: Guest
        account_disabled: yes

    # ----------------------------------------------------------------
    # ENFORCE: CIS 2.39 — LimitBlankPasswordUse Enabled (registry authority on 2025)
    # ----------------------------------------------------------------
    - name: "CIS 2.39 | Enable 'Limit local account use of blank passwords' (registry)"
      ansible.windows.win_regedit:
        path: HKLM:\SYSTEM\CurrentControlSet\Control\Lsa
        name: LimitBlankPasswordUse
        data: 1
        type: dword

    # ----------------------------------------------------------------
    # (OPTIONAL) CIS 2.40 — Rename Administrator (OFF by default)
    # ----------------------------------------------------------------
    - name: "CIS 2.40 | Rename built-in Administrator (optional, disabled by org policy)"
      ansible.windows.win_powershell:
        script: |
          $ErrorActionPreference = "Stop"
          $current = Get-LocalUser | Where-Object { $_.SID.Value -match "-500$" }
          if ($null -ne $current -and $current.Name -ne "{{ cis_admin_new_name }}") {
            Rename-LocalUser -Name $current.Name -NewName "{{ cis_admin_new_name }}"
          }
      when: apply_cis_240 | bool

    # ----------------------------------------------------------------
    # (OPTIONAL) CIS 2.41 — Rename Guest (OFF by default)
    # ----------------------------------------------------------------
    - name: "CIS 2.41 | Rename built-in Guest (optional, disabled by org policy)"
      ansible.windows.win_powershell:
        script: |
          $ErrorActionPreference = "Stop"
          $current = Get-LocalUser | Where-Object { $_.SID.Value -match "-501$" }
          if ($null -ne $current -and $current.Name -ne "{{ cis_guest_new_name }}") {
            Rename-LocalUser -Name $current.Name -NewName "{{ cis_guest_new_name }}"
          }
      when: apply_cis_241 | bool

    # ===================== AUDIT (post-change) ======================
    - name: "Audit post-change values for CIS 2.38–2.41"
      ansible.windows.win_powershell:
        script: |
          $ErrorActionPreference = "Stop"

          # Resolve built-in account display names by well-known RIDs
          $admin = Get-LocalUser | Where-Object { $_.SID.Value -match "-500$" }
          $guest = Get-LocalUser | Where-Object { $_.SID.Value -match "-501$" }

          $adminName   = if ($admin) { $admin.Name } else { "Not Found" }
          $guestName   = if ($guest) { $guest.Name } else { "Not Found" }
          $guestStatus = if ($guest) { if ($guest.Enabled) { "Enabled" } else { "Disabled" } } else { "Not Found" }

          # LimitBlankPasswordUse — authoritative in registry on Server 2025
          try {
            $lbpu = (Get-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\Lsa" -Name "LimitBlankPasswordUse" -ErrorAction Stop).LimitBlankPasswordUse
            $lbpu_disp = if ([int]$lbpu -eq 1) { "Enabled" } else { "Disabled" }
          } catch {
            $lbpu_disp = "Not Defined"
          }

          @{
            AdminDisplayName   = $adminName
            GuestDisplayName   = $guestName
            GuestAccountStatus = $guestStatus
            LimitBlankPw       = $lbpu_disp
            GeneratedAt        = (Get-Date).ToString("yyyy-MM-dd HH:mm:ss")
          } | ConvertTo-Json
      register: secopt_post_audit

    # ===== Pre-check the J2 path on the controller =====
    - name: "Verify report template exists on controller"
      delegate_to: localhost
      ansible.builtin.stat:
        path: "{{ report_template_path }}"
      register: report_tpl_stat

    - name: "Fail early if template is missing"
      when: not report_tpl_stat.stat.exists
      delegate_to: localhost
      ansible.builtin.fail:
        msg: "Report template not found at {{ report_template_path }}. Commit/push it and Project → Sync in AWX."

    # ===== Render HTML report =====
    - name: Render Enforcement Report
      delegate_to: localhost
      ansible.builtin.template:
        src: "{{ report_template_path }}"
        dest: "/tmp/{{ report_filename }}"
      vars:
        audit: "{{ secopt_post_audit.stdout | from_json }}"
        apply_cis_240: "{{ apply_cis_240 | default(false) }}"
        apply_cis_241: "{{ apply_cis_241 | default(false) }}"
