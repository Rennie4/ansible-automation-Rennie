---
- name: Windows-2025-securityoptions-compare-and-publish-RG
  hosts: all
  gather_facts: yes
  vars:
    s3_bucket_name: "oml-s3-automation-sandbox"
    s3_region: "eu-west-1"
    report_filename: "CIS_Audit_2.38_2.44_{{ inventory_hostname }}_{{ ansible_date_time.iso8601_basic_short }}.html"

  tasks:
    - name: Run CIS Security Options Audit (2.38 - 2.44)
      win_shell: |
        $LsaPath = "HKLM:\System\CurrentControlSet\Control\Lsa"
        
        # Fixed 2.38: Find Guest account by checking for the -501 RID suffix
        $GuestAccount = Get-LocalUser | Where-Object { $_.SID -match '-501$' }
        
        $results = @{
            # 2.38 (L1) Accounts: Guest account status
            "2.38_GuestAccountStatus"  = if ($GuestAccount) { $GuestAccount.Enabled } else { "Not Found" }
            
            # 2.39 (L1) Accounts: Limit local account use of blank passwords
            "2.39_LimitBlankPassword"  = (Get-ItemProperty $LsaPath -Name "LimitBlankPasswordUse" -ErrorAction SilentlyContinue).LimitBlankPasswordUse
            
            # 2.40 (L1) Audit: Force logoff when session expires
            "2.40_AuditForceLogoff"    = (Get-ItemProperty $LsaPath -Name "AuditLogonEvents" -ErrorAction SilentlyContinue).AuditLogonEvents
            
            # 2.41 (L1) Audit: Shut down system immediately if unable to log security audits
            "2.41_ShutDownOnAuditFail" = (Get-ItemProperty $LsaPath -Name "CrashOnAuditFail" -ErrorAction SilentlyContinue).CrashOnAuditFail
            
            # 2.42 (L1) Devices: Allowed to format and eject removable media
            "2.42_MediaEject"          = (Get-ItemProperty "HKLM:\Software\Microsoft\Windows NT\CurrentVersion\Winlogon" -Name "AllocateDASD" -ErrorAction SilentlyContinue).AllocateDASD
            
            # 2.43 (L1) Devices: Allow undock without having to log on
            "2.43_UndockWithoutLogon"  = (Get-ItemProperty "HKLM:\Software\Microsoft\Windows\CurrentVersion\Policies\System" -Name "UndockWithoutLogon" -ErrorAction SilentlyContinue).UndockWithoutLogon
            
            # 2.44 (L1) Devices: Prevent users from installing printer drivers
            "2.44_PreventPrintDrivers" = (Get-ItemProperty "HKLM:\System\CurrentControlSet\Control\Print\Providers\LanMan Print Services\Servers" -Name "AddPrinterDrivers" -ErrorAction SilentlyContinue).AddPrinterDrivers
        }
        $results | ConvertTo-Json
      register: full_audit
      check_mode: no

    - name: Render Full Report
      delegate_to: localhost
      template:
        src: "../templates/Windows-2025-securityoptions-compare-and-publish-RG.j2"
        dest: "/tmp/{{ report_filename }}"
      vars:
        audit: "{{ full_audit.stdout | from_json }}"
      check_mode: no

    - name: Upload to S3
      delegate_to: localhost
      amazon.aws.s3_object:
        bucket: "{{ s3_bucket_name }}"
        object: "security-options-reports/{{ report_filename }}"
        src: "/tmp/{{ report_filename }}"
        mode: put
        region: "{{ s3_region }}"
      check_mode: no
