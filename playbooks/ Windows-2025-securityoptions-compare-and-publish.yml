---
# =====================================================================
# Windows-2025-securityoptions-compare-and-publish.yml
# Updated for reliability, path consistency, and no hardcoded volumes.
# =====================================================================

- name: "CIS Security Options (2.38–2.101): Compare & Publish HTML Report to S3"
  hosts: windows_hosts
  gather_facts: yes # Gathering facts helps with inventory_hostname and date/time

  vars:
    win_temp_dir: "C:\\Temp"
    inf_path: "{{ win_temp_dir }}\\SecExport.inf"
    html_report: "{{ win_temp_dir }}\\CIS_SecOptions_report_{{ inventory_hostname }}.html"
    apply_win: "{{ win_temp_dir }}\\Windows-2025-apply-securityoptions.yml"

    region: "eu-west-1"
    # Using a variable for the AWS CLI path to make it easy to update if needed
    aws_exe_path: "C:\\Program Files\\Amazon\\AWSCLIV2\\aws.exe"

    # S3 destinations
    s3_bucket_uri: "s3://oml-s3-automation-sandbox/security-options-reports"
    s3_prefix_html: "security-options/{{ inventory_hostname }}/"
    s3_prefix_apply: "apply/{{ inventory_hostname }}/"

    cis_baseline:
      - { id: "2.38", type: "special", key: "guest_status", desired: "Disabled" }
      - { id: "2.39", type: "reg_dword", root: "HKLM", path: "System\\CurrentControlSet\\Control\\Lsa", name: "LimitBlankPasswordUse", desired: 1 }
      - { id: "2.43", type: "reg_dword", root: "HKLM", path: "System\\CurrentControlSet\\Control\\Lsa", name: "CrashOnAuditFail", desired: 0 }
      - { id: "2.77", type: "reg_dword", root: "HKLM", path: "System\\CurrentControlSet\\Control\\Lsa", name: "ForceGuest", desired: 0 }
      - { id: "2.82", type: "reg_dword", root: "HKLM", path: "System\\CurrentControlSet\\Control\\Lsa", name: "NoLMHash", desired: 1 }
      - { id: "2.84", type: "reg_dword", root: "HKLM", path: "System\\CurrentControlSet\\Control\\Lsa", name: "LmCompatibilityLevel", desired: 5 }

  tasks:
    - name: "Ensure Temp directory exists"
      ansible.windows.win_file:
        path: "{{ win_temp_dir }}"
        state: directory

    - name: "Export Local Security Policy to INF"
      ansible.windows.win_shell: |
        secedit /export /cfg "{{ inf_path }}" /quiet
        if (Test-Path "{{ inf_path }}") { return "{{ inf_path }}" } else { exit 1 }
      register: secedit_inf_path

    - name: "Parse INF and extract current values (JSON)"
      ansible.windows.win_shell: |
        $raw = Get-Content "{{ inf_path }}" -Raw
        $lines = $raw -split "`r?`n"
        $start = ($lines | Select-String '^\[Registry Values\]$').LineNumber
        $next = $lines | Select-String '^\[.*\]' | ? { $_.LineNumber -gt $start } | Select-Object -First 1
        $end = if ($next) { $next.LineNumber - 1 } else { $lines.Count }
        $block = $lines[$start .. ($end - 1)] | ? { $_ -match '=' -and $_ -notmatch '^\s*;' }

        $map = @{}
        foreach ($line in $block) {
            $p = $line -split '=', 2
            $left = $p[0].Trim(); $right = $p[1].Trim()
            if ($right -match '^(\d+)\s*,\s*(.*)$') {
                $val = if ([int]$matches[1] -eq 4) { if ($matches[2] -match '^\d+$') { [int]$matches[2] } else { $matches[2] } } else { $matches[2].Trim('"') }
            } else { $val = $right }
            $map[$left] = $val
        }
        $guest = Get-LocalUser | ? { $_.SID.Value -like '*-501' } | Select-Object -First 1
        [pscustomobject]@{ Registry = $map; GuestEnabled = if ($guest) { $guest.Enabled } else { $null } } | ConvertTo-Json
      register: current_json

    - name: "Set current values to fact"
      ansible.builtin.set_fact:
        current: "{{ current_json.stdout | from_json }}"

    - name: "Compute non-compliant items"
      ansible.builtin.set_fact:
        non_compliant: >-
          {%- set out = [] -%}
          {%- for item in cis_baseline -%}
            {%- if item.type == 'special' -%}
              {%- set cur = current.GuestEnabled | default(None) -%}
              {%- set des = (item.desired == 'Enabled') -%}
              {%- if cur != des -%}{%- set _ = out.append(item | combine({'current': cur})) -%}{%- endif -%}
            {%- else -%}
              {%- set key = 'MACHINE\\' ~ item.path ~ '\\' ~ item.name -%}
              {%- set cur = current.Registry[key] | default(None) | int if current.Registry[key] is defined and current.Registry[key] is number else current.Registry[key] | default(None) -%}
              {%- if cur != item.desired -%}{%- set _ = out.append(item | combine({'current': cur})) -%}{%- endif -%}
            {%- endif -%}
          {%- endfor -%}{{ out }}

    - name: "Generate HTML report"
      ansible.windows.win_copy:
        dest: "{{ html_report }}"
        content: |
          <html>
          <head><style>body{font-family:Arial;} table{border-collapse:collapse;width:100%;} th,td{border:1px solid #ccc;padding:6px;} th{background:#eee;} .bad{background:#ffe0e0;}</style></head>
          <body>
          <h2>CIS Security Options Report ({{ inventory_hostname }})</h2>
          <table>
            <tr><th>CIS ID</th><th>Setting</th><th>Current</th><th>Expected</th></tr>
            {% for i in non_compliant %}
            <tr class="bad">
              <td>{{ i.id }}</td>
              <td>{{ i.root if i.type != 'special' else 'Special' }}\\{{ i.path if i.type != 'special' else '' }}\\{{ i.name if i.type != 'special' else i.key }}</td>
              <td>{{ i.current }}</td>
              <td>{{ i.desired }}</td>
            </tr>
            {% endfor %}
          </table>
          </body></html>

    - name: "Upload HTML report to S3"
      ansible.windows.win_shell: >
        & "{{ aws_exe_path }}" s3 cp "{{ html_report }}"
        "{{ s3_bucket_uri }}/{{ s3_prefix_html }}"
        --region {{ region }}
      register: s3_html
      failed_when: s3_html.rc != 0

    - name: "Render and Upload APPLY playbook"
      ansible.windows.win_copy:
        dest: "{{ apply_win }}"
        content: |
          ---
          - name: "APPLY – CIS Security Options"
            hosts: {{ inventory_hostname }}
            tasks:
            {% for i in non_compliant %}
              - name: "Fix {{ i.id }}"
                {% if i.type == 'reg_dword' %}
                ansible.windows.win_regedit:
                  path: "{{ i.root }}\\{{ i.path }}"
                  name: "{{ i.name }}"
                  data: {{ i.desired }}
                  type: dword
                {% endif %}
            {% endfor %}

    - name: "Upload APPLY playbook to S3"
      ansible.windows.win_shell: >
        & "{{ aws_exe_path }}" s3 cp "{{ apply_win }}"
        "{{ s3_bucket_uri }}/{{ s3_prefix_apply }}"
        --region {{ region }}
      failed_when: false # Prevent failure if no changes were found
