---
- name: Windows-2025-securityoptions-compare-and-publish-RG
  hosts: all
  gather_facts: yes
  vars:
    s3_bucket_name: "oml-s3-automation-sandbox"
    s3_region: "eu-west-1"
    # Dynamic filename ensures no overwrites and survives reboots
    report_filename: "Security_Options_Audit_{{ inventory_hostname }}_{{ ansible_date_time.iso8601_basic_short }}.html"

  tasks:
    - name: Run Unified Audit (Security Options)
      win_shell: |
        $tempFile = "C:\Windows\Temp\secedit_audit.inf"
        secedit /export /cfg $tempFile /areas SECURITYPOLICY | Out-Null
        $policy = Get-Content $tempFile
        Remove-Item $tempFile

        # Helper to parse secedit lines
        function Get-Val($key) {
            $line = $policy | Select-String "^$key\s*="
            if ($line) { return $line.ToString().Split('=')[1].Trim() }
            return "Not Defined"
        }

        # Gather Account and Security Options
        @{
            GuestAccountStatus   = Get-Val "EnableGuestAccount"
            PasswordHistory      = Get-Val "PasswordHistorySize"
            MaxPasswordAge       = Get-Val "MaximumPasswordAge"
            MinPasswordAge       = Get-Val "MinimumPasswordAge"
            MinPasswordLength    = Get-Val "MinimumPasswordLength"
            LimitBlankPassword   = (Get-ItemProperty "HKLM:\System\CurrentControlSet\Control\Lsa" -Name "LimitBlankPasswordUse").LimitBlankPasswordUse
            AuditCrash           = (Get-ItemProperty "HKLM:\System\CurrentControlSet\Control\Lsa" -Name "CrashOnAuditFail").CrashOnAuditFail
            LmCompatibility      = (Get-ItemProperty "HKLM:\System\CurrentControlSet\Control\Lsa" -Name "LmCompatibilityLevel").LmCompatibilityLevel
            # Add additional keys as needed for the 107 items
        } | ConvertTo-Json
      register: full_audit
      check_mode: no

    - name: Render Full Report
      delegate_to: localhost
      template:
        src: "../templates/Windows-2025-securityoptions-compare-and-publish-RG.j2"
        dest: "/tmp/{{ report_filename }}"
      vars:
        audit: "{{ full_audit.stdout | from_json }}"
      check_mode: no

    - name: Upload to S3
      delegate_to: localhost
      amazon.aws.s3_object:
        bucket: "{{ s3_bucket_name }}"
        object: "security-options-reports/{{ report_filename }}"
        src: "/tmp/{{ report_filename }}"
        mode: put
        region: "{{ s3_region }}"
      check_mode: no
